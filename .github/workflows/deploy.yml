name: CI/CD - Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_BACKEND: filehub-backend
  ECR_REPOSITORY_FRONTEND: filehub-frontend
  ECS_CLUSTER: filehub
  ECS_SERVICE_BACKEND: backend
  ECS_SERVICE_FRONTEND: frontend

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npm test

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm test

  deploy:
    name: Build & Deploy to AWS
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Check AWS secrets
        id: check-secrets
        env:
          AWS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
          ECR: ${{ secrets.ECR_REGISTRY }}
        run: |
          if [ -z "$AWS_KEY" ] || [ -z "$ECR" ]; then
            echo "aws_configured=false" >> $GITHUB_OUTPUT
            echo "AWS secrets not configured. Skipping deploy."
          else
            echo "aws_configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        if: steps.check-secrets.outputs.aws_configured == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.check-secrets.outputs.aws_configured == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend
        if: steps.check-secrets.outputs.aws_configured == 'true'
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:latest \
            -t $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG \
            -f Dockerfile.prod .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND --all-tags
        working-directory: ./backend

      - name: Build & push frontend
        if: steps.check-secrets.outputs.aws_configured == 'true'
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg VITE_API_URL="" \
            -t $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:latest \
            -t $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG \
            -f Dockerfile.prod .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND --all-tags
        working-directory: ./frontend

      - name: Deploy backend to ECS
        if: steps.check-secrets.outputs.aws_configured == 'true'
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE_BACKEND \
            --force-new-deployment

      - name: Deploy frontend to ECS
        if: steps.check-secrets.outputs.aws_configured == 'true'
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE_FRONTEND \
            --force-new-deployment

      - name: Wait for ECS deployments
        if: steps.check-secrets.outputs.aws_configured == 'true'
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE_BACKEND $ECS_SERVICE_FRONTEND
