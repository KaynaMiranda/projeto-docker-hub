services:
  db:
    image: postgres:16-alpine
    container_name: filehub-db
    environment:
      POSTGRES_DB: filehub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - filehub-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d filehub"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: filehub-backend
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/filehub?schema=public
      STORAGE_DIR: /app/uploads
      CORS_ORIGIN: http://localhost:5173
      AI_PROVIDER: mock
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - filehub-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s

  frontend:
    build:
      context: ./frontend
    container_name: filehub-frontend
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - filehub-net

volumes:
  postgres_data:

networks:
  filehub-net:
    driver: bridge
