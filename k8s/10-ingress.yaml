apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: filehub-ingress
  namespace: filehub
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    # Sem campo `host`: atende localhost, 127.0.0.1, filehub.local (sem depender do arquivo hosts).
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /files
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          - path: /shares
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          - path: /ai-results
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: backend
                port:
                  number: 3000
