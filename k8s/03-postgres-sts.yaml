apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: filehub
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: filehub-db
  namespace: filehub
spec:
  serviceName: filehub-db
  replicas: 1
  selector:
    matchLabels:
      app: filehub-db
  template:
    metadata:
      labels:
        app: filehub-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: "filehub"
            - name: POSTGRES_USER
              value: "filehub"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: filehub-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "filehub", "-d", "filehub"]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
